version: "3.9"
x-env: &common-env
  env_file: .env
services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lora}
      POSTGRES_DB: ${POSTGRES_DB:-lora}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lora}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    <<: *common-env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app
      - ./shared:/app/shared
      - ./training:/app/training
      - ./outputs:/app/outputs
    restart: unless-stopped
    command: celery -A tasks worker --loglevel=info --concurrency=2
  # ── Model server ────────────────────────────────────────────────────────────
  model_server:
    build:
      context: ./backend
      dockerfile: Dockerfile.model
    <<: *common-env
    ports:
      - "8001:8001"
    volumes:
      - adapter_store:/adapters
      - ./outputs:/app/outputs
    environment:
      LOCAL_OUTPUT_DIR: /app/outputs
      ADAPTER_DIR: /adapters/current
      ADAPTER_HISTORY_DIR: /adapters/history
    restart: unless-stopped
    command: python -m model_server.hf_serve
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  postgres_data:
  adapter_store: